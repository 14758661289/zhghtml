<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中华生灵·探索站 - 视频介绍</title>
    <link rel="stylesheet" href="css/wdnmd.css">

    <style>
        /* 这里写专门针对视频页面的简单样式 */
        body {
            background-color: #f0f2f5; /* 浅灰背景,弹布，垂排，平居垂居，满高*/
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            font-family: "Microsoft YaHei", sans-serif;
        }

        .video-container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); /* 卡阴 */
            text-align: center;
            width: 80%;
            max-width: 900px; /* 限最宽 */
        }

        h1 {
            color: #333;
            margin-bottom: 20px;
        }

        /* 视频播放器样式 */
        video {
            width: 100%;
            border-radius: 8px;
            outline: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .back-btn {
            display: inline-block;
            margin-top: 20px;
            text-decoration: none;
            color: #666;
            font-size: 14px;
            transition: color 0.3s;/* 重 */
        }

        .back-btn:hover {
            color: #2c3e50;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="video-container">
        <h1>🎥 中华生灵纪录片</h1>


        <!-- controls: 显示播放/暂停/音量按钮 -->
        <!-- autoplay: 自动播放 (部分浏览器需要配合 muted 才能生效) -->
        <!-- poster: 视频封面图  -->
        <video controls poster="img/man.jpg">
            <!-- src 填写你的视频文件路径，支持 mp4 -->
            <source src="video/zoo.mp4" type="video/mp4">
            您的浏览器不支持 HTML5 视频播放。
        </video>


        <br>
        <a href="index.html" class="back-btn">← 返回首页</a>
        <br>
        <br>
        <p>本视频来源：b站 Director鹤唳云端</p>
    </div>

</body>
</html>
